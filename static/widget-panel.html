<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HelpdeskAI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body { display: flex; flex-direction: column; }
    body.dark { background: #050505; color: #fff; }
    body.light { background: #fff; color: #101014; }
    
    .header {
      height: 76px; padding: 0 18px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(130,130,140,.18); flex-shrink: 0;
    }
    .avatar {
      width: 42px; height: 42px; border-radius: 999px; background: #fff; color: #000;
      display: grid; place-items: center; font-weight: 900; font-size: 12px; overflow: hidden;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .title { min-width: 0; flex: 1; }
    .title strong {
      display: block; font-size: 15px; line-height: 1.1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .title span { display: block; margin-top: 4px; font-size: 12px; color: #22c55e; font-weight: 700; }
    .icon-btn {
      width: 36px; height: 36px; border-radius: 999px; border: 0;
      background: rgba(130,130,140,.13); color: inherit;
      display: grid; place-items: center; cursor: pointer; transition: background .2s;
    }
    .icon-btn:hover { background: rgba(130,130,140,.22); }
    
    .messages {
      flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
    }
    .message {
      max-width: 82%; border-radius: 20px; padding: 12px 14px;
      font-size: 14px; line-height: 1.5; word-break: break-word;
    }
    .message strong { font-weight: 800; }
    .message code {
      font-size: 12px; padding: 2px 5px; border-radius: 6px;
      background: rgba(130,130,140,.2); font-family: monospace;
    }
    .assistant { align-self: flex-start; }
    .user { align-self: flex-end; }
    body.dark .assistant { background: #1d1d22; color: #f4f4f5; }
    body.light .assistant { background: #f3f4f6; color: #16161a; }
    
    .typing {
      display: inline-flex; gap: 4px; align-items: center; min-width: 46px;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 999px; background: currentColor; opacity: .45;
      animation: bounce 1s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: .12s; }
    .typing span:nth-child(3) { animation-delay: .24s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }
    
    .inputbar {
      height: 76px; padding: 12px; display: flex; align-items: center; gap: 10px;
      border-top: 1px solid rgba(130,130,140,.18); flex-shrink: 0;
    }
    .inputwrap {
      flex: 1; min-width: 0; height: 50px; display: flex; align-items: center;
      border-radius: 999px; padding: 0 14px; border: 1px solid rgba(130,130,140,.35);
    }
    .input {
      width: 100%; border: 0; outline: 0; background: transparent;
      color: inherit; font-size: 14px; font-family: inherit;
    }
    .input::placeholder { color: #8f8f9b; }
    .send {
      width: 48px; height: 48px; border: 0; border-radius: 999px;
      display: grid; place-items: center; cursor: pointer;
      transition: opacity .2s, transform .2s;
    }
    .send:disabled { opacity: .55; cursor: not-allowed; }
    .send:not(:disabled):hover { transform: scale(1.04); }
  </style>
</head>
<body class="dark">
  <div class="header">
    <div class="avatar">AI</div>
    <div class="title">
      <strong>Support Agent</strong>
      <span>Online now</span>
    </div>
    <button class="icon-btn clear-btn" title="Clear chat" aria-label="Clear chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/>
      </svg>
    </button>
    <button class="icon-btn close-btn" title="Close" aria-label="Close chat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
  
  <div class="messages"></div>
  
  <form class="inputbar">
    <div class="inputwrap">
      <input class="input" placeholder="Message..." autocomplete="off" />
    </div>
    <button class="send" type="submit" aria-label="Send message">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="m5 12 14-7-7 14-2-5-5-2Z"/>
      </svg>
    </button>
  </form>
  
  <script src="/static/widget-panel.js"></script>
</body>
</html>
